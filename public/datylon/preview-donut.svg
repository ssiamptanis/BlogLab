<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="180" fill="#111111"/>
  <text x="16" y="22" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">DONUT CHART</text>
  <!-- Donut segments -->
  <circle cx="130" cy="97" r="52" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="24"/>
  <!-- Segment 1: pink ~40% -->
  <circle cx="130" cy="97" r="52" fill="none" stroke="#FF0077" stroke-width="24"
    stroke-dasharray="130.7 195.4" stroke-dashoffset="130.7" transform="rotate(-90 130 97)"/>
  <!-- Segment 2: white ~30% -->
  <circle cx="130" cy="97" r="52" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="24"
    stroke-dasharray="97.4 228.7" stroke-dashoffset="326.1" transform="rotate(-90 130 97)" opacity="0.7"/>
  <!-- Segment 3: muted ~20% -->
  <circle cx="130" cy="97" r="52" fill="none" stroke="rgba(255,0,119,0.35)" stroke-width="24"
    stroke-dasharray="65.1 261" stroke-dashoffset="228.7" transform="rotate(-90 130 97)"/>
  <!-- Centre label -->
  <text x="130" y="93" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">64%</text>
  <text x="130" y="108" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">PRIMARY</text>
  <!-- Legend -->
  <rect x="205" y="60" width="8" height="8" rx="2" fill="#FF0077"/>
  <text x="217" y="69" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.55)">Series A</text>
  <rect x="205" y="78" width="8" height="8" rx="2" fill="rgba(255,255,255,0.75)"/>
  <text x="217" y="87" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.55)">Series B</text>
  <rect x="205" y="96" width="8" height="8" rx="2" fill="rgba(255,0,119,0.35)"/>
  <text x="217" y="105" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.55)">Series C</text>
  <!-- Pink bottom accent -->
  <rect x="0" y="170" width="320" height="3" fill="#FF0077"/>
</svg>
